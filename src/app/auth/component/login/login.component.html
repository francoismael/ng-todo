<div class="auth-page">

  <!-- ── Panneau gauche : formulaire ── -->
  <div class="auth-panel-left">
    <div class="auth-inner">

      <div class="auth-brand">
        <div class="auth-logo">
          <svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="purpleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#A020F0"/>
                <stop offset="50%" stop-color="#8A2BE2"/>
                <stop offset="100%" stop-color="#5F00BA"/>
              </linearGradient>
              <filter id="softGlow">
                <feGaussianBlur stdDeviation="8" result="blur"/>
                <feMerge>
                  <feMergeNode in="blur"/>
                  <feMergeNode in="SourceGraphic"/>
                </feMerge>
              </filter>
            </defs>
            <rect x="20" y="20" width="160" height="160" rx="40" fill="url(#purpleGradient)" filter="url(#softGlow)"/>
            <rect x="60" y="55" width="70" height="10" rx="5" fill="white" opacity="0.9"/>
            <rect x="60" y="85" width="70" height="10" rx="5" fill="white" opacity="0.9"/>
            <rect x="60" y="115" width="45" height="10" rx="5" fill="white" opacity="0.9"/>
            <path d="M65 115 L80 130 L120 85" fill="none" stroke="white" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <span class="brand-name">TaskFlow</span>
      </div>

      <div class="auth-header">
        <h1>Connexion</h1>
        <p class="auth-subtitle">Accédez à votre espace personnel</p>
      </div>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="auth-form" autocomplete="off">
        <div class="auth-field">
          <label for="username">Nom d'utilisateur</label>
          <input id="username" type="text" formControlName="username" placeholder="Votre pseudo" autocomplete="off"/>
        </div>

        <div class="auth-field">
          <label for="password">Mot de passe</label>
          <div class="input-password-wrap">
            <input id="password" [type]="showPassword ? 'text' : 'password'" formControlName="password" placeholder="••••••••" autocomplete="new-password"/>
            <button type="button" class="eye-btn" (click)="showPassword = !showPassword" tabindex="-1">
              <svg *ngIf="!showPassword" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
              </svg>
              <svg *ngIf="showPassword" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            </button>
          </div>
        </div>

        <div *ngIf="errorMessage" class="alert-error">{{ errorMessage }}</div>

        <button type="submit" class="btn-auth" [disabled]="isLoading">
          <svg *ngIf="isLoading" class="btn-spinner" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="12" cy="12" r="10" stroke="rgba(255,255,255,0.4)" stroke-width="3"/>
            <path d="M12 2a10 10 0 0 1 10 10" stroke="white" stroke-width="3" stroke-linecap="round"/>
          </svg>
          <span>{{ isLoading ? 'Connexion...' : 'Se connecter' }}</span>
        </button>
      </form>

      <!-- <p class="auth-footer">
        Pas encore de compte ? <a routerLink="/auth/register">S'inscrire</a>
      </p> -->

    </div>
  </div>

  <!-- ── Panneau droit : illustration ── -->
  <div class="auth-panel-right">
    <div class="illustration-wrap">
      <svg viewBox="0 0 360 300" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Halo de fond -->
        <circle cx="180" cy="148" r="115" fill="rgba(255,255,255,0.07)"/>

        <!-- Clipboard principal -->
        <rect x="110" y="55" width="130" height="175" rx="12" fill="rgba(255,255,255,0.18)" stroke="rgba(255,255,255,0.35)" stroke-width="1.5"/>
        <!-- Clip agrafe -->
        <rect x="148" y="46" width="64" height="18" rx="9" fill="rgba(255,255,255,0.28)"/>

        <!-- Ligne 1 — cochée -->
        <circle cx="133" cy="98" r="9" fill="rgba(255,255,255,0.22)"/>
        <path d="M129 98 L132 101 L138 95" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        <rect x="148" y="94" width="76" height="8" rx="4" fill="rgba(255,255,255,0.5)"/>

        <!-- Ligne 2 — cochée -->
        <circle cx="133" cy="124" r="9" fill="rgba(255,255,255,0.22)"/>
        <path d="M129 124 L132 127 L138 121" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        <rect x="148" y="120" width="76" height="8" rx="4" fill="rgba(255,255,255,0.5)"/>

        <!-- Ligne 3 — non cochée -->
        <circle cx="133" cy="150" r="9" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.35)" stroke-width="1.5"/>
        <rect x="148" y="146" width="55" height="8" rx="4" fill="rgba(255,255,255,0.28)"/>

        <!-- Ligne 4 — non cochée -->
        <circle cx="133" cy="176" r="9" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.35)" stroke-width="1.5"/>
        <rect x="148" y="172" width="68" height="8" rx="4" fill="rgba(255,255,255,0.28)"/>

        <!-- Personnage stylisé (droite) -->
        <!-- Tête -->
        <circle cx="292" cy="108" r="20" fill="rgba(255,255,255,0.18)" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
        <!-- Corps -->
        <line x1="292" y1="128" x2="292" y2="178" stroke="rgba(255,255,255,0.65)" stroke-width="2.5" stroke-linecap="round"/>
        <!-- Bras gauche (vers clipboard) -->
        <path d="M292 148 Q268 138 250 128" stroke="rgba(255,255,255,0.65)" stroke-width="2.5" stroke-linecap="round" fill="none"/>
        <!-- Bras droit -->
        <path d="M292 148 Q310 140 320 135" stroke="rgba(255,255,255,0.65)" stroke-width="2.5" stroke-linecap="round" fill="none"/>
        <!-- Jambe gauche -->
        <line x1="292" y1="178" x2="275" y2="215" stroke="rgba(255,255,255,0.65)" stroke-width="2.5" stroke-linecap="round"/>
        <!-- Jambe droite -->
        <line x1="292" y1="178" x2="309" y2="215" stroke="rgba(255,255,255,0.65)" stroke-width="2.5" stroke-linecap="round"/>

        <!-- Badge check flottant haut-gauche -->
        <circle cx="62" cy="118" r="24" fill="rgba(50,30,90,0.55)"/>
        <path d="M53 118 L59 124 L72 111" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

        <!-- Badge check flottant bas-gauche -->
        <circle cx="50" cy="205" r="24" fill="rgba(50,30,90,0.45)"/>
        <path d="M41 205 L47 211 L60 198" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </svg>
    </div>

    <p class="panel-tagline">Gérez vos tâches de façon simple et efficace avec TaskFlow...</p>

    <div class="panel-dots">
      <span class="dot active"></span>
      <span class="dot"></span>
      <span class="dot"></span>
    </div>
  </div>

</div>
